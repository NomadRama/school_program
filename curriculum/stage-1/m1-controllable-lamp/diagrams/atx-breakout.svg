              <rect x="8"  y="66"  width="14" height="10" rx="1"/>
              <rect x="8"  y="78"  width="14" height="10" rx="1"/>
              <rect x="8"  y="90"  width="14" height="10" rx="1"/>
              <rect x="8"  y="102" width="14" height="10" rx="1"/>
              <rect x="8"  y="114" width="14" height="10" rx="1"/>
              <rect x="8"  y="126" width="14" height="10" rx="1"/>
              <rect x="8"  y="138" width="14" height="10" rx="1"/>
              <!-- правый ряд -->
              <rect x="28" y="6"   width="14" height="10" rx="1"/>
              <rect x="28" y="18"  width="14" height="10" rx="1"/>
              <rect x="28" y="30"  width="14" height="10" rx="1"/>
              <rect x="28" y="42"  width="14" height="10" rx="1"/>
              <rect x="28" y="54"  width="14" height="10" rx="1"/>
              <rect x="28" y="66"  width="14" height="10" rx="1"/>
              <rect x="28" y="78"  width="14" height="10" rx="1"/>
