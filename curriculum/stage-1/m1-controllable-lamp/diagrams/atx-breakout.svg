<!-- Извлечено из docs/module-1/index.html скриптом tools/extract_svgs.py -->
<!-- aria-label: Плата-разветвитель ATX 24-pin -->
<svg viewBox="0 0 340 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Плата-разветвитель ATX 24-pin" style="max-width:360px">
          <defs>
            <linearGradient id="pcbGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#2367B5"/>
              <stop offset="1" stop-color="#143F7A"/>
            </linearGradient>
            <linearGradient id="connGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FAFAFA"/>
              <stop offset="1" stop-color="#CFCFCF"/>
            </linearGradient>
            <radialGradient id="jackRed" cx="0.35" cy="0.3" r="0.7">
              <stop offset="0" stop-color="#FF7A6A"/>
              <stop offset="0.55" stop-color="#D8392B"/>
              <stop offset="1" stop-color="#7A1612"/>
            </radialGradient>
            <radialGradient id="jackBlack" cx="0.35" cy="0.3" r="0.7">
              <stop offset="0" stop-color="#555"/>
              <stop offset="0.55" stop-color="#1F1F1F"/>
              <stop offset="1" stop-color="#050505"/>
            </radialGradient>
            <linearGradient id="metalBase" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F2F2F2"/>
              <stop offset="0.5" stop-color="#B8B8B8"/>
              <stop offset="1" stop-color="#7A7A7A"/>
            </linearGradient>
            <linearGradient id="fuseGlass" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F8F5E0" stop-opacity="0.9"/>
              <stop offset="0.5" stop-color="#E8E0B5" stop-opacity="0.5"/>
              <stop offset="1" stop-color="#C9BD7A" stop-opacity="0.9"/>
            </linearGradient>
            <filter id="pcbShadow" x="-5%" y="-5%" width="110%" height="115%">
              <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
            </filter>
          </defs>

          <!-- PCB (портретная ориентация) -->
          <rect x="20" y="20" width="300" height="540" rx="8" fill="url(#pcbGrad)" filter="url(#pcbShadow)"/>
          <rect x="20" y="20" width="300" height="540" rx="8" fill="none" stroke="#0E2E58" stroke-width="1"/>

          <!-- Монтажные отверстия -->
          <g fill="#F4F1EA" stroke="#8B7E5C" stroke-width="1">
            <circle cx="40" cy="40" r="6"/>
            <circle cx="300" cy="40" r="6"/>
            <circle cx="40" cy="540" r="6"/>
            <circle cx="300" cy="540" r="6"/>
          </g>

          <!-- Декоративные дорожки -->
          <g stroke="#FFFFFF22" stroke-width="1" fill="none">
            <path d="M 140 120 L 210 120"/>
            <path d="M 140 220 L 210 220"/>
            <path d="M 140 320 L 210 320"/>
            <path d="M 140 420 L 210 420"/>
            <path d="M 90 380 L 90 470"/>
          </g>

