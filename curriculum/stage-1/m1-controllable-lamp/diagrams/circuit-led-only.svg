<?xml version="1.0" encoding="UTF-8"?>
<!-- Fritzing-style: контуры компонентов + прямые провода. Цикл 1 TRY: ATX → LED -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img"
     aria-label="Простая цепь: 2 провода от ATX к светодиоду"
     style="max-width:720px">
  <style>
    .stroke  { fill:none; stroke:#1F3A5F; stroke-width:2 }
    .stroke-thin { fill:none; stroke:#1F3A5F; stroke-width:1.2 }
    .stroke-gray { fill:none; stroke:#8B8B8B; stroke-width:1 }
    .lbl { font:11px sans-serif; fill:#1F3A5F }
    .lbl-sm { font:9px sans-serif; fill:#8B8B8B }
    .lbl-bold { font:bold 11px monospace; fill:#1F3A5F }
    .lbl-mute { font:10px monospace; fill:#AAA }
    .wire-red { stroke:#E03838; stroke-width:4; fill:none; stroke-linecap:square }
    .wire-blk { stroke:#1A1A1A; stroke-width:4; fill:none; stroke-linecap:square }
  </style>

  <!-- ============ ATX PLATE (горизонтальная, сверху) ============ -->
  <g transform="translate(40, 30)">
    <!-- PCB контур -->
    <rect x="0" y="0" width="640" height="160" rx="6" class="stroke"/>

    <!-- Монтажные отверстия -->
    <circle cx="15" cy="15" r="4" class="stroke-thin"/>
    <circle cx="625" cy="15" r="4" class="stroke-thin"/>
    <circle cx="15" cy="145" r="4" class="stroke-thin"/>
    <circle cx="625" cy="145" r="4" class="stroke-thin"/>

    <!-- OFF/ON тумблер (слева) -->
    <rect x="35" y="20" width="50" height="20" rx="2" class="stroke-thin"/>
    <text x="42" y="34" class="lbl-sm">OFF</text>
    <text x="65" y="34" class="lbl-sm" style="fill:#1F3A5F;font-weight:bold">ON</text>

    <!-- 24-pin разъём (центр) -->
    <rect x="230" y="10" width="180" height="48" rx="3" class="stroke"/>
    <g class="stroke-gray">
      <!-- 2 ряда × 12 пинов — упрощённо -->
      <line x1="240" y1="22" x2="402" y2="22"/>
      <line x1="240" y1="46" x2="402" y2="46"/>
    </g>
    <text x="320" y="36" text-anchor="middle" class="lbl-sm">24-pin ATX разъём</text>

    <!-- PWR LED (справа) -->
    <circle cx="590" cy="28" r="5" fill="#D8392B" stroke="#8A1A12" stroke-width="1"/>
    <text x="590" y="48" text-anchor="middle" class="lbl-sm">PWR</text>

    <!-- Предохранители (ряд из 4) -->
    <g>
      <rect x="50"  y="65" width="100" height="14" rx="2" class="stroke-thin"/>
      <text x="100" y="89" text-anchor="middle" class="lbl-sm">предохранитель</text>

      <rect x="190" y="65" width="100" height="14" rx="2" class="stroke-thin"/>
      <rect x="330" y="65" width="100" height="14" rx="2" class="stroke-thin"/>
      <rect x="470" y="65" width="100" height="14" rx="2" class="stroke-thin"/>
    </g>

    <!-- Клеммы — 4 пары по низу -->
    <!-- (-12V / GND) -->
    <g transform="translate(55, 115)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="0" y="35" text-anchor="middle" class="lbl-mute">−12V</text>
      <circle cx="40" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" class="lbl-mute">GND</text>
    </g>

    <!-- (+12V / GND) -->
    <g transform="translate(190, 115)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="0" y="35" text-anchor="middle" class="lbl-mute">+12V</text>
      <circle cx="40" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" class="lbl-mute">GND</text>
    </g>

    <!-- (+5V / GND) -->
    <g transform="translate(325, 115)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="0" y="35" text-anchor="middle" class="lbl-mute">+5V</text>
      <circle cx="40" cy="0" r="10" fill="none" stroke="#8B8B8B" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" class="lbl-mute">GND</text>
    </g>

    <!-- (+3.3V / GND) — ПОДСВЕЧЕНО, используем -->
    <g transform="translate(460, 115)">
      <!-- +3.3V красная клемма -->
      <circle cx="0" cy="0" r="10" fill="#E03838" stroke="#8A1A12" stroke-width="2"/>
      <text x="0" y="35" text-anchor="middle" class="lbl-bold">+3.3V</text>
      <!-- GND чёрная клемма -->
      <circle cx="40" cy="0" r="10" fill="#1A1A1A" stroke="#000" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" class="lbl-bold">GND</text>
    </g>

    <!-- Подпись платы -->
    <text x="320" y="178" text-anchor="middle" class="lbl" style="font-weight:700">Плата ATX</text>
  </g>

  <!-- ============ ПРОВОДА (прямые, как в Fritzing) ============ -->
  <!-- Красный провод: +3.3V клемма (x=560) → + ножка LED (x=550 внизу) -->
  <g>
    <path d="M 560 205 L 560 280 L 400 280 L 400 350" class="wire-red"/>
  </g>

  <!-- Чёрный провод: − ножка LED (x=460 внизу) → GND клемма (x=600) -->
  <g>
    <path d="M 440 350 L 440 300 L 600 300 L 600 205" class="wire-blk"/>
  </g>

  <!-- ============ LED (внизу, контур) ============ -->
  <g transform="translate(360, 350)">
    <!-- Колба — верх -->
    <path d="M 10 50 Q 10 5 45 0 Q 80 5 80 50 L 80 65 L 10 65 Z" class="stroke" stroke-width="2.5"/>
    <!-- маленькая деталь внутри — анод-катод для LED символа -->
    <line x1="35" y1="15" x2="35" y2="40" class="stroke-thin" style="stroke:#B8B8B8"/>
    <path d="M 55 20 L 40 30 L 55 40 Z" fill="#B8B8B8" style="opacity:.4"/>

    <!-- Фланец под колбой -->
    <rect x="5" y="63" width="80" height="6" class="stroke" stroke-width="1.5"/>

    <!-- Ножка длинная (+), слева, длиной 30px -->
    <line x1="40" y1="69" x2="40" y2="100" class="stroke" style="stroke:#8B8B8B;stroke-width:2.5"/>
    <!-- Ножка короткая (−), справа, длиной 15px -->
    <line x1="80" y1="69" x2="80" y2="85" class="stroke" style="stroke:#8B8B8B;stroke-width:2.5"/>

    <!-- Метка + -->
    <circle cx="40" cy="100" r="7" fill="#E03838" stroke="#8A1A12" stroke-width="1"/>
    <text x="40" y="104" text-anchor="middle" style="font:bold 12px sans-serif;fill:#FFF">+</text>
    <text x="40" y="125" text-anchor="middle" class="lbl-sm" style="font-weight:600">длинная</text>

    <!-- Метка − -->
    <circle cx="80" cy="85" r="7" fill="#1A1A1A" stroke="#000" stroke-width="1"/>
    <text x="80" y="89" text-anchor="middle" style="font:bold 13px sans-serif;fill:#FFF">−</text>
    <text x="80" y="110" text-anchor="middle" class="lbl-sm" style="font-weight:600">короткая</text>

    <!-- Подпись -->
    <text x="45" y="-10" text-anchor="middle" class="lbl" style="font-weight:700">LED 3 Вт</text>
  </g>

  <!-- Подпись проводов -->
  <text x="260" y="285" class="lbl" style="fill:#C94C4C;font-weight:600">провод 1 (красный)</text>
  <text x="480" y="295" class="lbl" style="fill:#3A3A3A;font-weight:600">провод 2 (чёрный)</text>

  <!-- Общая подпись -->
  <text x="360" y="425" text-anchor="middle" class="lbl-sm" style="font-style:italic;font-size:11px">Цикл 1 · Try — всего 2 провода, LED горит когда цепь замкнута</text>
</svg>
