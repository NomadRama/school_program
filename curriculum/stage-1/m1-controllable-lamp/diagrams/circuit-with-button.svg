            <circle cx="520" cy="130" r="5" fill="#2B2B2B" stroke="#000" stroke-width="1.5"/>
            <text x="530" y="134" class="bd-pinlbl" font-weight="bold">−</text>

            <path d="M 180 95 L 280 95" class="bd-wire" stroke="#E8A33D"/>
            <text x="230" y="88" text-anchor="middle" class="bd-wlbl" fill="#B8822A">+3.3V</text>
            <path d="M 420 95 L 520 95" class="bd-wire" stroke="#F0C040"/>
