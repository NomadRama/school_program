<?xml version="1.0" encoding="UTF-8"?>
<!-- Извлечено из docs/module-1/index.html скриптом tools/extract_svgs.py -->
<!-- aria-label: Пример схемы на бумаге -->
<svg viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Пример схемы на бумаге">
            <!-- Блок ATX (плюс) -->
            <rect x="30"  y="80" width="110" height="80" rx="8" class="bd-comp bd-source"/>
            <text x="85"  y="108" text-anchor="middle" class="bd-title">ATX</text>
            <text x="85"  y="126" text-anchor="middle" class="bd-pinlbl" font-weight="bold" fill="#E8A33D">+3.3V</text>
            <circle cx="140" cy="100" r="5" fill="#E8A33D" stroke="#8B6F18" stroke-width="2"/>
            <circle cx="140" cy="140" r="5" fill="#2B2B2B" stroke="#000" stroke-width="1.5"/>
            <text x="146" y="144" class="bd-pinlbl" font-weight="bold">GND</text>

            <!-- Кнопка -->
            <rect x="220" y="80" width="110" height="80" rx="8" class="bd-comp bd-btn"/>
            <text x="275" y="108" text-anchor="middle" class="bd-title">КНОПКА</text>
            <text x="275" y="128" text-anchor="middle" class="bd-sub">палец</text>
            <circle cx="220" cy="100" r="5" class="bd-pin"/>
            <circle cx="330" cy="100" r="5" class="bd-pin"/>

            <!-- LED -->
            <rect x="410" y="80" width="110" height="80" rx="8" class="bd-comp bd-led"/>
            <text x="465" y="108" text-anchor="middle" class="bd-title">LED</text>
            <circle cx="410" cy="100" r="5" fill="#C94C4C" stroke="#8B1A1A" stroke-width="2"/>
            <text x="420" y="104" class="bd-pinlbl" font-weight="bold">+</text>
            <text x="402" y="104" text-anchor="end" class="bd-sub" style="fill:#C94C4C">длинная</text>
            <circle cx="520" cy="100" r="5" fill="#2B2B2B" stroke="#000" stroke-width="1.5"/>
            <text x="515" y="104" text-anchor="end" class="bd-pinlbl" font-weight="bold">−</text>
            <text x="530" y="104" class="bd-sub">короткая</text>

            <!-- провода с стрелками направления тока -->
            <defs>
              <marker id="arrCurrent" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
                <polygon points="0 0, 10 5, 0 10" fill="#E8A33D"/>
              </marker>
            </defs>

            <!-- провод 1: ATX + → кнопка -->
            <path d="M 140 100 L 220 100" class="bd-wire" stroke="#E8A33D" marker-end="url(#arrCurrent)"/>
            <text x="180" y="92" text-anchor="middle" class="bd-wlbl" fill="#B8822A">провод</text>

            <!-- провод 2: кнопка → LED + -->
            <path d="M 330 100 L 410 100" class="bd-wire" stroke="#E8A33D" marker-end="url(#arrCurrent)"/>
            <text x="370" y="92" text-anchor="middle" class="bd-wlbl" fill="#B8822A">провод</text>

            <!-- провод 3 (обратный): LED − → ATX GND -->
            <path d="M 520 100 L 600 100 L 600 180 L 140 180 L 140 140" class="bd-wire" stroke="#2B2B2B" marker-end="url(#arrCurrent)"/>
            <text x="370" y="196" text-anchor="middle" class="bd-wlbl" fill="#2B2B2B">провод — обратный путь</text>

            <!-- подпись -->
            <text x="340" y="30" text-anchor="middle" style="font:italic 13px sans-serif;fill:#5A5A5A">← ток течёт от плюса через цепь обратно в минус ←</text>
          </svg>
