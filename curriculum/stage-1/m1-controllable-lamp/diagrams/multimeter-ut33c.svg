<?xml version="1.0" encoding="UTF-8"?>
<!-- Извлечено из docs/module-1/index.html скриптом tools/extract_svgs.py -->
<!-- aria-label: Мультиметр UNI-T UT33C+ с подписями -->
<svg viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Мультиметр UNI-T UT33C+ с подписями">
          <defs>
            <linearGradient id="mmBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F0BC3A"/>
              <stop offset="1" stop-color="#D49A1C"/>
            </linearGradient>
            <radialGradient id="mmDial" cx="0.3" cy="0.3" r="0.8">
              <stop offset="0" stop-color="#3A3A3A"/>
              <stop offset="1" stop-color="#1A1A1A"/>
            </radialGradient>
          </defs>

          <!-- корпус -->
          <rect x="160" y="20" width="240" height="340" rx="18" fill="url(#mmBody)" stroke="#8B6F18" stroke-width="2"/>

          <!-- LCD экран -->
          <rect x="185" y="40" width="190" height="68" rx="4" fill="#B8D4B8" stroke="#5A7A5A" stroke-width="1.5"/>
          <text x="360" y="85" text-anchor="end" font-family="monospace" font-size="30" fill="#1A3A1A" font-weight="bold">3.30</text>
          <text x="195" y="65" font-family="monospace" font-size="9" fill="#3A5A3A">DC V</text>
          <text x="370" y="100" text-anchor="end" font-family="monospace" font-size="8" fill="#3A5A3A">HOLD</text>

          <!-- HOLD кнопка -->
          <rect x="195" y="120" width="50" height="22" rx="3" fill="#2A2A2A"/>
          <text x="220" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFF">HOLD</text>

          <!-- RANGE кнопка -->
          <rect x="315" y="120" width="60" height="22" rx="3" fill="#2A2A2A"/>
          <text x="345" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFF">RANGE</text>

          <!-- Круговой переключатель -->
          <circle cx="280" cy="210" r="70" fill="url(#mmDial)" stroke="#1A1A1A" stroke-width="1"/>
          <circle cx="280" cy="210" r="55" fill="none" stroke="#555" stroke-width="0.5"/>
          <!-- метки положений -->
          <text x="280" y="153" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF" font-weight="bold">OFF</text>
          <text x="332" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FFD700" font-weight="bold">V=</text>
          <text x="352" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF">V~</text>
          <text x="332" y="258" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF">Ω</text>
          <text x="280" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFF">🔊</text>
          <text x="228" y="258" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF">hFE</text>
          <text x="208" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF">A=</text>
          <text x="228" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFF">A~</text>
          <!-- указатель положения (на V=) -->
          <g transform="translate(280,210)">
            <rect x="-3" y="-45" width="6" height="28" rx="2" fill="#FFD700"/>
            <circle cx="0" cy="0" r="8" fill="#555" stroke="#FFD700" stroke-width="1.5"/>
          </g>

          <!-- Гнёзда (jacks) -->
          <g>
            <!-- 10A (верхнее, не используем в модуле) -->
            <circle cx="205" cy="320" r="10" fill="#2A2A2A" stroke="#FFF" stroke-width="1"/>
            <circle cx="205" cy="320" r="5" fill="#D4503A"/>
            <text x="205" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1A1A" font-weight="bold">10A</text>

            <!-- VΩmA (красный) -->
            <circle cx="280" cy="320" r="10" fill="#2A2A2A" stroke="#FFF" stroke-width="1"/>
            <circle cx="280" cy="320" r="5" fill="#D4503A"/>
            <text x="280" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1A1A" font-weight="bold">VΩmA</text>

            <!-- COM (чёрный) -->
            <circle cx="355" cy="320" r="10" fill="#2A2A2A" stroke="#FFF" stroke-width="1"/>
            <circle cx="355" cy="320" r="5" fill="#1A1A1A"/>
            <text x="355" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#1A1A1A" font-weight="bold">COM</text>
          </g>

          <!-- Логотип UT33C+ -->
          <text x="280" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1A1A1A" font-weight="bold">UNI-T UT33C+</text>

          <!-- ВЫНОСКИ-ПОЯСНЕНИЯ -->
          <g font-family="sans-serif" font-size="12" fill="#1F3A5F">
            <!-- 1. Экран -->
            <path d="M 185 74 L 110 74" stroke="#C94C4C" stroke-width="1.5" fill="none"/>
            <circle cx="185" cy="74" r="3" fill="#C94C4C"/>
            <text x="100" y="70" text-anchor="end" font-weight="bold">① Экран</text>
            <text x="100" y="84" text-anchor="end" font-size="10" fill="#6B6B6B">показывает результат</text>

            <!-- 2. Переключатель режимов -->
            <path d="M 350 210 L 460 210" stroke="#C94C4C" stroke-width="1.5" fill="none"/>
            <circle cx="350" cy="210" r="3" fill="#C94C4C"/>
            <text x="470" y="205" font-weight="bold">② Переключатель</text>
            <text x="470" y="220" font-size="10" fill="#6B6B6B">что мерять</text>
            <text x="470" y="234" font-size="10" fill="#B8822A" font-weight="bold">V=  постоянное напряжение</text>
            <text x="470" y="248" font-size="10" fill="#6B6B6B">Ω — сопротивление</text>
            <text x="470" y="262" font-size="10" fill="#6B6B6B">🔊 — прозвонка (пикает)</text>

            <!-- 3. Гнездо COM -->
            <path d="M 355 335 L 355 360 L 460 360" stroke="#2B2B2B" stroke-width="1.5" fill="none"/>
            <text x="470" y="358" font-weight="bold" fill="#2B2B2B">③ COM (чёрный)</text>
            <text x="470" y="372" font-size="10" fill="#6B6B6B">сюда чёрный провод — «минус»</text>

            <!-- 4. Гнездо VΩmA -->
            <path d="M 280 335 L 280 375 L 180 375" stroke="#D4503A" stroke-width="1.5" fill="none"/>
            <text x="175" y="373" text-anchor="end" font-weight="bold" fill="#D4503A">④ VΩmA (красный)</text>
          </g>

          <!-- Щупы (упрощённо) -->
          <g>
            <!-- красный щуп -->
            <circle cx="280" cy="320" r="3" fill="#D4503A"/>
            <path d="M 280 320 Q 100 360 50 200 Q 30 150 80 130" stroke="#D4503A" stroke-width="3" fill="none" stroke-linecap="round"/>
            <rect x="70" y="115" width="20" height="30" rx="3" fill="#D4503A"/>
            <rect x="76" y="100" width="8" height="18" fill="#AAA"/>
            <path d="M 80 100 L 80 95" stroke="#888" stroke-width="3"/>

            <!-- чёрный щуп -->
            <circle cx="355" cy="320" r="3" fill="#1A1A1A"/>
            <path d="M 355 320 Q 500 360 540 210 Q 540 180 490 160" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
            <rect x="480" y="145" width="20" height="30" rx="3" fill="#1A1A1A"/>
            <rect x="486" y="130" width="8" height="18" fill="#AAA"/>
            <path d="M 490 130 L 490 125" stroke="#888" stroke-width="3"/>
          </g>
        </svg>
