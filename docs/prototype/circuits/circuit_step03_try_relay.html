<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цикл 3 · Try — Кнопка → реле → LED</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { margin:0; padding:0; display:flex; justify-content:center; align-items:flex-start;
         background:transparent; overflow:hidden;
         font-family:'Inter','Segoe UI',system-ui,sans-serif; }
  .sim { width:100%; height:680px; display:flex; flex-direction:column;
         align-items:center; justify-content:center; background:transparent; }
  svg { width:100%; height:100%; overflow:visible; }

  .wire { fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .dot  { r:3.5; }
  .wlbl { font-family:monospace; font-size:11px; font-weight:700; }
</style>
</head>
<body>

<div class="sim">
  <svg viewBox="0 0 900 620">
    <g id="atx-layer"></g>
    <g id="wires-layer"></g>
    <g id="button-layer"></g>
    <g id="relay-layer"></g>
    <g id="led-layer"></g>
    <g id="legend-layer"></g>
  </svg>
</div>

<script src="component_registry.js"></script>
<script>
  // ==== SOP: pins = визуальная позиция; провода НЕ пересекают bbox ====

  const ATX_OFFSET    = { tx: 80,  ty: 10  };
  const BUTTON_OFFSET = { tx: 130, ty: 330 };
  const RELAY_OFFSET  = { tx: 320, ty: 330 };
  const LED_OFFSET    = { tx: 740, ty: 360 };

  const atx   = COMPONENT_LIBRARY["atx_xh_m229"];
  const btn   = COMPONENT_LIBRARY["button_tactile_2pin"];
  const relay = COMPONENT_LIBRARY["relay_jqc_3ff_s_z"];
  const led   = COMPONENT_LIBRARY["led_3w_star"];

  document.getElementById('atx-layer').innerHTML    = atx.renderSVG({ x: ATX_OFFSET.tx, y: ATX_OFFSET.ty });
  document.getElementById('button-layer').innerHTML = btn.renderSVG();
  document.getElementById('button-layer').setAttribute('transform', `translate(${BUTTON_OFFSET.tx}, ${BUTTON_OFFSET.ty})`);
  document.getElementById('relay-layer').innerHTML  = relay.renderSVG({ x: RELAY_OFFSET.tx, y: RELAY_OFFSET.ty });
  document.getElementById('led-layer').innerHTML    = led.renderSVG({ x: LED_OFFSET.tx, y: LED_OFFSET.ty });

  // Точки подключения (визуальный центр = pin.x/y + offset)
  const a_3v3 = pin(atx,   'plus3V3', ATX_OFFSET);    // y≈170
  const a_gnd = pin(atx,   'gnd_4',   ATX_OFFSET);    // y≈170
  const b_a   = pin(btn,   'pin_a',   BUTTON_OFFSET);
  const b_b   = pin(btn,   'pin_b',   BUTTON_OFFSET);
  const r_dcp = pin(relay, 'dc_plus', RELAY_OFFSET);
  const r_dcm = pin(relay, 'dc_minus',RELAY_OFFSET);
  const r_sig = pin(relay, 'signal',  RELAY_OFFSET);
  const r_com = pin(relay, 'com',     RELAY_OFFSET);
  const r_no  = pin(relay, 'no',      RELAY_OFFSET);
  const l_a   = pin(led,   'anode',   LED_OFFSET);
  const l_c   = pin(led,   'cathode', LED_OFFSET);

  // Нижние грани компонентов (для коридоров)
  const ATX_BOTTOM   = ATX_OFFSET.ty   + atx.bbox.y   + atx.bbox.h;    // 10+30+220 = 260
  const RELAY_BOTTOM = RELAY_OFFSET.ty + relay.bbox.y + relay.bbox.h;  // 330+0+130 = 460
  const LED_TOP      = LED_OFFSET.ty   + led.bbox.y;                   // 360

  // Коридор ПОД ATX (между низом ATX и верхом нижних компонентов),
  // с разносом 15px для параллельных проводов
  const CORRIDOR = (i) => ATX_BOTTOM + 20 + i * 15;
  const Y_ABOVE_LED  = LED_TOP - 10;       // коридор выше LED (для обхода справа)
  const X_RIGHT_ATX  = ATX_OFFSET.tx + atx.bbox.x + atx.bbox.w + 15;  // правее ATX
  const X_RIGHT_RELAY = RELAY_OFFSET.tx + relay.bbox.x + relay.bbox.w + 20;  // правее реле
  const X_LEFT_RELAY  = RELAY_OFFSET.tx + relay.bbox.x - 20;   // левее реле
  const X_LEFT_BUTTON = BUTTON_OFFSET.tx + btn.bbox.x - 20;    // левее кнопки

  const path = pts => pts.map(p => `${p.x},${p.y}`).join(' ');

  const wires = [
    // 1. ATX +3.3V → кнопка pin_a (коридор под ATX, затем слева кнопки)
    {
      color: '#EF4444',
      points: [
        a_3v3,
        { x: a_3v3.x,        y: CORRIDOR(0) },
        { x: X_LEFT_BUTTON,  y: CORRIDOR(0) },
        { x: X_LEFT_BUTTON,  y: b_a.y },
        b_a
      ],
      labelAt: { x: 400, y: CORRIDOR(0) - 5 }, labelText: '+3.3V → кнопка'
    },
    // 2. Кнопка pin_b → Relay IN (между кнопкой и реле, ниже их верхней границы)
    {
      color: '#22c55e',
      points: [
        b_b,
        { x: X_LEFT_RELAY,   y: b_b.y },
        { x: X_LEFT_RELAY,   y: r_sig.y },
        r_sig
      ],
      labelAt: { x: X_LEFT_RELAY + 5, y: (b_b.y + r_sig.y)/2 - 4 }, labelText: 'сигнал → IN'
    },
    // 3. ATX +3.3V → Relay DC+ (коридор под ATX, затем слева реле)
    {
      color: '#EF4444',
      points: [
        a_3v3,
        { x: a_3v3.x,        y: CORRIDOR(1) },
        { x: X_LEFT_RELAY - 15, y: CORRIDOR(1) },
        { x: X_LEFT_RELAY - 15, y: r_dcp.y },
        r_dcp
      ],
      labelAt: { x: 470, y: CORRIDOR(1) - 5 }, labelText: '+3.3V → DC+'
    },
    // 4. ATX GND → Relay DC- (коридор под ATX, ниже чем wire 3)
    {
      color: '#1d1d1f',
      points: [
        a_gnd,
        { x: a_gnd.x,        y: CORRIDOR(2) },
        { x: X_LEFT_RELAY - 30, y: CORRIDOR(2) },
        { x: X_LEFT_RELAY - 30, y: r_dcm.y },
        r_dcm
      ],
      labelAt: { x: 500, y: CORRIDOR(2) - 5 }, labelText: 'GND → DC−'
    },
    // 5. ATX +3.3V → Relay COM (обход ATX справа, над LED, справа реле)
    {
      color: '#EF4444',
      points: [
        a_3v3,
        { x: a_3v3.x,        y: CORRIDOR(0) },
        { x: X_RIGHT_ATX,    y: CORRIDOR(0) },
        { x: X_RIGHT_ATX,    y: Y_ABOVE_LED },
        { x: X_RIGHT_RELAY,  y: Y_ABOVE_LED },
        { x: X_RIGHT_RELAY,  y: r_com.y },
        r_com
      ],
      labelAt: { x: X_RIGHT_ATX + 5, y: Y_ABOVE_LED - 4 }, labelText: '+3.3V → COM'
    },
    // 6. Relay NO → LED+ (справа реле, в зазоре между реле и LED)
    {
      color: '#FBBF24',
      points: [
        r_no,
        { x: X_RIGHT_RELAY,  y: r_no.y },
        { x: X_RIGHT_RELAY,  y: l_a.y },
        l_a
      ],
      labelAt: { x: X_RIGHT_RELAY + 5, y: l_a.y - 8 }, labelText: 'NO → LED+'
    },
    // 7. LED− → ATX GND (справа LED, затем коридор под ATX до GND)
    {
      color: '#1d1d1f',
      points: [
        l_c,
        { x: LED_OFFSET.tx + led.bbox.w + 20, y: l_c.y },
        { x: LED_OFFSET.tx + led.bbox.w + 20, y: CORRIDOR(3) },
        { x: a_gnd.x,        y: CORRIDOR(3) },
        a_gnd
      ],
      labelAt: { x: LED_OFFSET.tx + led.bbox.w + 28, y: l_c.y + 15 }, labelText: 'GND'
    }
  ];

  const wiresSvg = wires.map(w => `
    <polyline class="wire" points="${path(w.points)}" stroke="${w.color}"/>
    <circle class="dot" cx="${w.points[0].x}" cy="${w.points[0].y}" fill="${w.color}"/>
    <circle class="dot" cx="${w.points[w.points.length-1].x}" cy="${w.points[w.points.length-1].y}" fill="${w.color}"/>
    <text class="wlbl" x="${w.labelAt.x}" y="${w.labelAt.y}" fill="${w.color}">${w.labelText}</text>
  `).join('');
  document.getElementById('wires-layer').innerHTML = wiresSvg;

  // Легенда
  const legend = `
    <g transform="translate(60, 590)" font-family="sans-serif" font-size="11">
      ${[
        ['#EF4444', 'питание +3.3V', 0],
        ['#1d1d1f', 'земля GND', 170],
        ['#22c55e', 'сигнал управления', 300],
        ['#FBBF24', 'нагрузка к LED', 490]
      ].map(([c, t, x]) =>
        `<line x1="${x}" y1="0" x2="${x+25}" y2="0" stroke="${c}" stroke-width="3" stroke-linecap="round"/>
         <text x="${x+32}" y="4" fill="#1e2a4a">${t}</text>`
      ).join('')}
    </g>
  `;
  document.getElementById('legend-layer').innerHTML = legend;
</script>
</body>
</html>
