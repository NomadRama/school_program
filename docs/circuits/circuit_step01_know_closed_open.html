<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know 1 · Closed vs Open Circuit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #1d1d1f;
            width: 100vw;
            height: 100vh;
        }

        /* Animation for electrons */
        @keyframes flow {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }

        .wire { stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .wire-solid { stroke-width: 4; }
        
        /* The electron flow path */
        .electron-flow {
            stroke: #FFC107;
            stroke-width: 3;
            stroke-dasharray: 4 16;
            animation: flow 1s linear infinite;
            fill: none;
        }

        .label {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .desc {
            font-size: 11px;
            fill: #6e6e73;
            font-style: italic;
        }
        .break-mark {
            stroke: #EF4444;
            stroke-width: 3;
            stroke-linecap: round;
        }
        
    </style>
</head>
<body>

    <!-- Scaled viewBox tightened for maximum scale -->
    <svg id="circuit" viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        
        <defs>
            <!-- Glowing LED effect for closed circuit -->
            <radialGradient id="ledGlowStrong">
                <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#FFEB3B" stop-opacity="0"/>
            </radialGradient>
        </defs>

        <!-- ========================================== -->
        <!-- LEFT SIDE: CLOSED CIRCUIT                  -->
        <!-- ========================================== -->
        <g transform="translate(15, 50)">
            <text x="220" y="-15" class="label" fill="#10B981" text-anchor="middle">✓ ЗАМКНУТАЯ — LED горит</text>
            
            <!-- Increased scale from 0.4 to 0.55 -->
            <g transform="scale(0.55)">
                <g id="left-components"></g>
                <g id="left-wires"></g>
            </g>
            
            <text x="220" y="415" class="desc" text-anchor="middle">электроны идут по кругу → LED горит</text>
        </g>

        <!-- ========================================== -->
        <!-- RIGHT SIDE: OPEN CIRCUIT                   -->
        <!-- ========================================== -->
        <g transform="translate(485, 50)">
            <text x="220" y="-15" class="label" fill="#EF4444" text-anchor="middle">✗ РАЗОМКНУТАЯ — LED не горит</text>
            
            <!-- Increased scale from 0.4 to 0.55 -->
            <g transform="scale(0.55)">
                <g id="right-components"></g>
                <g id="right-wires"></g>
            </g>
            
            <!-- Red X and break indicator at scale=1 for crispness -->
            <!-- x=341, y=206 corresponds exactly to the middle of the broken wire gap -->
            <g transform="translate(341, 206)">
                <line x1="-12" y1="-12" x2="12" y2="12" class="break-mark" stroke="#EF4444" stroke-width="3" stroke-linecap="round" />
                <line x1="-12" y1="12" x2="12" y2="-12" class="break-mark" stroke="#EF4444" stroke-width="3" stroke-linecap="round" />
                <text x="0" y="32" fill="#EF4444" font-size="12" font-weight="700" text-anchor="middle">РАЗРЫВ</text>
            </g>

            <text x="220" y="415" class="desc" text-anchor="middle">разрыв в круге — всё останавливается</text>
        </g>

    </svg>

<script src="component_registry.js"></script>
<script>
    // Component generation
    const atxComp = COMPONENT_LIBRARY["atx_xh_m229"];
    const ledComp = COMPONENT_LIBRARY["led_3w_star"];

    // SOP: координаты клемм/падов берём через pin() — визуальная позиция из реестра
    const ATX_OFFSET = { tx: 30,  ty: 0   };
    const LED_OFFSET = { tx: 370, ty: 600 };

    const atxPins = {
        "plus3V3": pin(atxComp, 'plus3V3', ATX_OFFSET),
        "gnd_4":   pin(atxComp, 'gnd_4',   ATX_OFFSET)
    };
    const ledPins = {
        "anode":   pin(ledComp, 'anode',   LED_OFFSET),
        "cathode": pin(ledComp, 'cathode', LED_OFFSET)
    };

    // Component Renders
    let atxSvg = atxComp.renderSVG({ x: ATX_OFFSET.tx, y: ATX_OFFSET.ty });
    let ledOnSvg  = ledComp.renderSVG({ x: LED_OFFSET.tx, y: LED_OFFSET.ty });
    let ledOffSvg = ledComp.renderSVG({ x: LED_OFFSET.tx, y: LED_OFFSET.ty });

    // Modify the ON led to glow strongly
    ledOnSvg = ledOnSvg.replace('opacity="0.3"', 'opacity="0.9" r="28"');

    // 1. LEFT SIDE (Closed)
    document.getElementById('left-components').innerHTML = atxSvg + ledOnSvg;
    
    // Left Wires (Closed)
    const wireRed = `
        <polyline points="${atxPins.plus3V3.x},${atxPins.plus3V3.y} ${atxPins.plus3V3.x},450 ${ledPins.anode.x - 50},450 ${ledPins.anode.x - 50},${ledPins.anode.y} ${ledPins.anode.x},${ledPins.anode.y}" class="wire wire-solid" stroke="#ef4444" />
        <polyline points="${atxPins.plus3V3.x},${atxPins.plus3V3.y} ${atxPins.plus3V3.x},450 ${ledPins.anode.x - 50},450 ${ledPins.anode.x - 50},${ledPins.anode.y} ${ledPins.anode.x},${ledPins.anode.y}" class="electron-flow" />
    `;
    const wireBlack = `
        <polyline points="${atxPins.gnd_4.x},${atxPins.gnd_4.y} ${atxPins.gnd_4.x},500 ${ledPins.cathode.x + 50},500 ${ledPins.cathode.x + 50},${ledPins.cathode.y} ${ledPins.cathode.x},${ledPins.cathode.y}" class="wire wire-solid" stroke="#1d1d1f" />
        <polyline points="${ledPins.cathode.x},${ledPins.cathode.y} ${ledPins.cathode.x + 50},${ledPins.cathode.y} ${ledPins.cathode.x + 50},500 ${atxPins.gnd_4.x},500 ${atxPins.gnd_4.x},${atxPins.gnd_4.y}" class="electron-flow" />
    `;
    
    document.getElementById('left-wires').innerHTML = wireRed + wireBlack + 
        `<circle cx="${atxPins.plus3V3.x}" cy="${atxPins.plus3V3.y}" r="8" fill="#ef4444"/>
         <circle cx="${ledPins.anode.x}" cy="${ledPins.anode.y}" r="8" fill="#ef4444"/>
         <circle cx="${atxPins.gnd_4.x}" cy="${atxPins.gnd_4.y}" r="8" fill="#1d1d1f"/>
         <circle cx="${ledPins.cathode.x}" cy="${ledPins.cathode.y}" r="8" fill="#1d1d1f"/>`;


    // 2. RIGHT SIDE (Open)
    // Remove the glow from OFF led
    ledOffSvg = ledOffSvg.replace(/<circle cx="\d+" cy="\d+" r="\d+" fill="url\(#ledGlow\)".*?\/>/, '');
    document.getElementById('right-components').innerHTML = atxSvg + ledOffSvg;

    // Right Wires (Open - with gap in red wire)
    const wireRedBroken = `
        <polyline points="${atxPins.plus3V3.x},${atxPins.plus3V3.y} ${atxPins.plus3V3.x},300" class="wire wire-solid" stroke="#ef4444" />
        <polyline points="${atxPins.plus3V3.x},450 ${ledPins.anode.x - 50},450 ${ledPins.anode.x - 50},${ledPins.anode.y} ${ledPins.anode.x},${ledPins.anode.y}" class="wire wire-solid" stroke="#ef4444" />
    `;
    const wireBlackOpen = `
        <polyline points="${atxPins.gnd_4.x},${atxPins.gnd_4.y} ${atxPins.gnd_4.x},500 ${ledPins.cathode.x + 50},500 ${ledPins.cathode.x + 50},${ledPins.cathode.y} ${ledPins.cathode.x},${ledPins.cathode.y}" class="wire wire-solid" stroke="#1d1d1f" />
    `;

    document.getElementById('right-wires').innerHTML = wireRedBroken + wireBlackOpen +
        `<circle cx="${atxPins.plus3V3.x}" cy="${atxPins.plus3V3.y}" r="8" fill="#ef4444"/>
         <circle cx="${ledPins.anode.x}" cy="${ledPins.anode.y}" r="8" fill="#ef4444"/>
         <circle cx="${atxPins.gnd_4.x}" cy="${atxPins.gnd_4.y}" r="8" fill="#1d1d1f"/>
         <circle cx="${ledPins.cathode.x}" cy="${ledPins.cathode.y}" r="8" fill="#1d1d1f"/>`;

</script>
</body>
</html>
