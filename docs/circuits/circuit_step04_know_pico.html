<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цикл 4 · Know — Pico и 3 активных пина</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { margin:0; padding:0; display:flex; justify-content:center; align-items:flex-start;
         background:transparent; overflow:hidden;
         font-family:'Inter','Segoe UI',system-ui,sans-serif; }
  .sim { width:100%; height:500px; display:flex; flex-direction:column;
         align-items:center; justify-content:center; background:transparent; }
  svg { width:100%; height:100%; overflow:visible; }

  .hl { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { filter: drop-shadow(0 0 0 transparent); }
    50% { filter: drop-shadow(0 0 6px currentColor); }
  }
  .co-line { stroke-width:1.4; stroke-dasharray:3 3; fill:none; }
</style>
</head>
<body>

<div class="sim">
  <svg viewBox="0 0 700 400">
    <g id="pico-layer"></g>
    <g id="highlight-layer"></g>
    <g id="callouts-layer"></g>
  </svg>
</div>

<script src="component_registry.js"></script>
<script>
  // ==== Правило SOP: координаты подсветки — из registry.pins, не хардкод ====
  const TX = 280, TY = 30;
  const pico = COMPONENT_LIBRARY["raspberry_pi_pico"];
  pico.bbox = { x: 0, y: 0, w: 140, h: 340 };
  document.getElementById('pico-layer').innerHTML = pico.renderSVG({ x: TX, y: TY });

  // Абсолютные координаты пина в системе viewBox
  const pinAbs = (pinKey) => ({
    x: pico.pins[pinKey].x + TX,
    y: pico.pins[pinKey].y + TY,
    side: pico.pins[pinKey].side
  });

  // ==== Подсветка трёх активных пинов для Модуля 1 ====
  const active = [
    { key: 'gp15',     color: '#3b82f6', accent: '#1e40af', bg: '#EFF6FF',
      label: 'GP15', subLabel: 'пин 20 · left',
      desc: '→ IN реле (сигнал)',
      side: 'left' },
    { key: 'v3v3_out', color: '#F59E0B', accent: '#B45309', bg: '#FFFBEB',
      label: '3V3',  subLabel: 'пин 36 · right',
      desc: '→ DC+ реле (питание)',
      side: 'right' },
    { key: 'gnd_38',   color: '#1d1d1f', accent: '#1d1d1f', bg: '#F3F4F6',
      label: 'GND',  subLabel: 'пин 38 · right',
      desc: '→ DC− реле (земля)',
      side: 'right' }
  ];

  let hl = '';
  let co = '';

  active.forEach((a, idx) => {
    const p = pinAbs(a.key);
    // Обводка пина
    hl += `<circle class="hl" style="color:${a.color}" cx="${p.x}" cy="${p.y}" r="7"
                   fill="none" stroke="${a.color}" stroke-width="2.5"/>`;

    // Позиция блока-подписи: смещение от пина наружу платы
    const isLeft = a.side === 'left';
    const labelX = isLeft ? 60 : 545;  // внешние края viewBox
    const labelAnchorX = isLeft ? p.x - 10 : p.x + 10;
    const labelY = isLeft ? 322 + idx*10 : (a.key === 'v3v3_out' ? 125 : 55);

    // Выноска
    co += `<line class="co-line" x1="${labelAnchorX}" y1="${p.y}" x2="${isLeft ? labelX + 125 : labelX}" y2="${labelY + 15}" stroke="${a.color}"/>`;
    // Бокс-подпись
    co += `<rect x="${labelX}" y="${labelY}" width="125" height="36" rx="6"
                 fill="${a.bg}" stroke="${a.color}" stroke-width="1.5"/>`;
    co += `<text x="${labelX + 62}" y="${labelY + 15}" text-anchor="middle"
                 fill="${a.accent}" font-size="12" font-weight="800" font-family="monospace">${a.label} (${a.subLabel.split(' · ')[0]})</text>`;
    co += `<text x="${labelX + 62}" y="${labelY + 29}" text-anchor="middle"
                 fill="${a.accent}" font-size="10" font-weight="600">${a.desc}</text>`;
  });

  document.getElementById('highlight-layer').innerHTML = hl;
  document.getElementById('callouts-layer').innerHTML = co + `
    <text x="50" y="385" fill="#9ca3af" font-size="11" font-style="italic" font-weight="500">
      Остальные 37 пинов приглушены — будут активны в Модулях 2–8
    </text>`;
</script>
</body>
</html>
