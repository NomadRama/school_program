<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цикл 3 · Try — Кнопка → реле → LED</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { margin:0; padding:0; display:flex; justify-content:center; align-items:flex-start;
         background:transparent; overflow:hidden;
         font-family:'Inter','Segoe UI',system-ui,sans-serif; }
  .sim { width:100%; height:680px; display:flex; flex-direction:column;
         align-items:center; justify-content:center; background:transparent; }
  svg { width:100%; height:100%; overflow:visible; }

  .wire { fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .dot  { r:3.5; }
  .wlbl { font-family:monospace; font-size:11px; font-weight:700; }
</style>
</head>
<body>

<div class="sim">
  <svg viewBox="0 0 940 620">
    <g id="atx-layer"></g>
    <g id="wires-layer"></g>
    <g id="button-layer"></g>
    <g id="relay-layer"></g>
    <g id="led-layer"></g>
    <g id="legend-layer"></g>
  </svg>
</div>

<script src="component_registry.js"></script>
<script>
  // ==== Правила (visual_rules.md):
  //   1. Только 90° (никаких диагоналей)
  //   2. Bus-rail для общих питаний (+3.3V и GND — единая шина, ответвления вниз)
  //   3. Минимум пересечений
  //   4. Палитра: красный=VCC, чёрный=GND, зелёный=сигнал, жёлтый=нагрузка
  //   5. Лейблы коротко: «+3.3V», «GND», «сигнал», «нагрузка»
  //   6. 40px padding от content до viewBox

  const ATX_OFFSET    = { tx: 100, ty: 20  };
  const BUTTON_OFFSET = { tx: 200, ty: 380 };
  const RELAY_OFFSET  = { tx: 360, ty: 360 };
  const LED_OFFSET    = { tx: 800, ty: 380 };

  const atx   = COMPONENT_LIBRARY["atx_xh_m229"];
  const btn   = COMPONENT_LIBRARY["button_tactile_2pin"];
  const relay = COMPONENT_LIBRARY["relay_jqc_3ff_s_z"];
  const led   = COMPONENT_LIBRARY["led_3w_star"];

  document.getElementById('atx-layer').innerHTML    = atx.renderSVG({ x: ATX_OFFSET.tx, y: ATX_OFFSET.ty });
  document.getElementById('button-layer').innerHTML = btn.renderSVG();
  document.getElementById('button-layer').setAttribute('transform', `translate(${BUTTON_OFFSET.tx}, ${BUTTON_OFFSET.ty})`);
  document.getElementById('relay-layer').innerHTML  = relay.renderSVG({ x: RELAY_OFFSET.tx, y: RELAY_OFFSET.ty });
  document.getElementById('led-layer').innerHTML    = led.renderSVG({ x: LED_OFFSET.tx, y: LED_OFFSET.ty });

  // ==== Pin-координаты ====
  const a_3v3 = pin(atx,   'plus3V3', ATX_OFFSET);
  const a_gnd = pin(atx,   'gnd_4',   ATX_OFFSET);
  const b_a   = pin(btn,   'pin_a',   BUTTON_OFFSET);
  const b_b   = pin(btn,   'pin_b',   BUTTON_OFFSET);
  const r_dcp = pin(relay, 'dc_plus', RELAY_OFFSET);
  const r_dcm = pin(relay, 'dc_minus',RELAY_OFFSET);
  const r_sig = pin(relay, 'signal',  RELAY_OFFSET);
  const r_com = pin(relay, 'com',     RELAY_OFFSET);
  const r_no  = pin(relay, 'no',      RELAY_OFFSET);
  const l_a   = pin(led,   'anode',   LED_OFFSET);
  const l_c   = pin(led,   'cathode', LED_OFFSET);

  // ==== Уровни шин (правило 2) ====
  const VCC_BUS_Y = ATX_OFFSET.ty + atx.bbox.y + atx.bbox.h + 30;     // y ≈ 280, главная шина +3.3V
  const GND_BUS_Y = VCC_BUS_Y + 25;                                    // y ≈ 305, шина GND ниже на 25px

  const path = pts => pts.map(p => `${p.x},${p.y}`).join(' ');

  // ==== Палитра (правило 4) ====
  const C_VCC  = '#EF4444';
  const C_GND  = '#1d1d1f';
  const C_SIG  = '#10B981';
  const C_LOAD = '#FBBF24';

  const wires = [
    // ── +3.3V шина ──
    // 1. Из клеммы вниз на VCC bus (главная шина-стержень)
    { color: C_VCC, points: [
        a_3v3,
        { x: a_3v3.x, y: VCC_BUS_Y },
        { x: b_a.x,   y: VCC_BUS_Y }
      ], label: { text: '+3.3V', x: 480, y: VCC_BUS_Y - 8 } },
    // 2. Drop к кнопке pin_a
    { color: C_VCC, points: [
        { x: b_a.x, y: VCC_BUS_Y },
        b_a
      ] },
    // 3. Drop к relay DC+
    { color: C_VCC, points: [
        { x: r_dcp.x, y: VCC_BUS_Y },
        r_dcp
      ] },
    // 4. Drop к relay COM (правее)
    { color: C_VCC, points: [
        { x: r_com.x, y: VCC_BUS_Y },
        r_com
      ] },

    // ── GND шина ──
    // 5. Из клеммы вниз на GND bus + протяжка влево
    { color: C_GND, points: [
        a_gnd,
        { x: a_gnd.x, y: GND_BUS_Y },
        { x: r_dcm.x, y: GND_BUS_Y }
      ], label: { text: 'GND', x: 500, y: GND_BUS_Y + 16 } },
    // 6. Drop к relay DC−
    { color: C_GND, points: [
        { x: r_dcm.x, y: GND_BUS_Y },
        r_dcm
      ] },
    // 7. Drop к LED− (катод). GND bus продлевается ВПРАВО до LED-катода
    { color: C_GND, points: [
        { x: a_gnd.x, y: GND_BUS_Y },
        { x: l_c.x,   y: GND_BUS_Y },
        l_c
      ] },

    // ── Сигнал (зелёный): button pin_b → relay IN ──
    { color: C_SIG, points: [
        b_b,
        { x: b_b.x,   y: r_sig.y },
        r_sig
      ], label: { text: 'сигнал', x: b_b.x + 8, y: (b_b.y + r_sig.y)/2 + 4 } },

    // ── Нагрузка (жёлтый): relay NO → LED+ (анод) ──
    { color: C_LOAD, points: [
        r_no,
        { x: l_a.x, y: r_no.y },
        l_a
      ], label: { text: 'нагрузка', x: (r_no.x + l_a.x)/2 - 30, y: r_no.y - 8 } }
  ];

  const wiresSvg = wires.map(w => {
    const start = w.points[0], end = w.points[w.points.length-1];
    const lbl = w.label
      ? `<text class="wlbl" x="${w.label.x}" y="${w.label.y}" fill="${w.color}">${w.label.text}</text>`
      : '';
    return `
      <polyline class="wire" points="${path(w.points)}" stroke="${w.color}"/>
      <circle class="dot" cx="${start.x}" cy="${start.y}" fill="${w.color}"/>
      <circle class="dot" cx="${end.x}" cy="${end.y}" fill="${w.color}"/>
      ${lbl}
    `;
  }).join('');
  document.getElementById('wires-layer').innerHTML = wiresSvg;

  // ==== Легенда ====
  const legend = `
    <g transform="translate(80, 590)" font-family="sans-serif" font-size="12">
      ${[
        [C_VCC,  'питание +3.3V', 0],
        [C_GND,  'земля GND',     180],
        [C_SIG,  'сигнал',        320],
        [C_LOAD, 'нагрузка',      450]
      ].map(([c, t, x]) =>
        `<line x1="${x}" y1="0" x2="${x+25}" y2="0" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
         <text x="${x+32}" y="5" fill="#1e2a4a" font-weight="500">${t}</text>`
      ).join('')}
    </g>
  `;
  document.getElementById('legend-layer').innerHTML = legend;
</script>
</body>
</html>
