<?xml version="1.0" encoding="UTF-8"?>
<!--
  Raspberry Pi Pico (original, RP2040, no WiFi)
  Физические размеры: 51 × 21 мм, толщина 1.0 мм
  40 пинов, шаг 2.54 мм. USB Micro-B сверху.
  Масштаб SVG: 1 мм = 10 единиц (viewBox 230×560).
  Источник: Raspberry Pi Pico Datasheet (Pico-R3-A4-Pinout.pdf).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 560" role="img"
     aria-label="Raspberry Pi Pico — распиновка" style="max-width:280px">

  <defs>
    <linearGradient id="picoPcb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F6B48"/>
      <stop offset="1" stop-color="#0A4A33"/>
    </linearGradient>
    <linearGradient id="usbMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0F0F0"/>
      <stop offset="0.5" stop-color="#B0B0B0"/>
      <stop offset="1" stop-color="#808080"/>
    </linearGradient>
    <radialGradient id="chipGrad" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#2A2A2A"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </radialGradient>
    <filter id="picoShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Плата PCB -->
  <rect x="15" y="20" width="200" height="510" rx="18" fill="url(#picoPcb)" filter="url(#picoShadow)"/>
  <rect x="15" y="20" width="200" height="510" rx="18" fill="none" stroke="#083523" stroke-width="1"/>

  <!-- Скруглённые углы со стороны USB (visual detail) -->

  <!-- USB Micro-B разъём (сверху) -->
  <g>
    <!-- корпус разъёма -->
    <rect x="80" y="5" width="70" height="28" rx="2" fill="url(#usbMetal)" stroke="#666" stroke-width="1"/>
    <!-- внутренний слот -->
    <rect x="90" y="10" width="50" height="10" rx="1" fill="#1A1A1A"/>
    <!-- метки -->
    <text x="115" y="51" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFFFFF99">USB</text>
  </g>

  <!-- Чип RP2040 (в центре) -->
  <g>
    <rect x="75" y="230" width="80" height="80" rx="3" fill="url(#chipGrad)" stroke="#333"/>
    <!-- метка точки pin1 -->
    <circle cx="82" cy="237" r="2" fill="#888"/>
    <!-- надпись -->
    <text x="115" y="265" text-anchor="middle" font-family="monospace" font-size="9"
          fill="#A0A0A0" font-weight="bold">RP2040</text>
    <text x="115" y="278" text-anchor="middle" font-family="monospace" font-size="6" fill="#707070">Dual M0+ · 133MHz</text>
    <text x="115" y="290" text-anchor="middle" font-family="monospace" font-size="5" fill="#606060">264KB RAM · 2MB Flash</text>
  </g>

  <!-- Флеш чип (поменьше, рядом с RP2040) -->
  <rect x="90" y="340" width="50" height="20" rx="2" fill="#1A1A1A" stroke="#444"/>
  <text x="115" y="354" text-anchor="middle" font-family="monospace" font-size="6" fill="#888">W25Q16JV</text>

  <!-- Кристалл кварц -->
  <rect x="168" y="260" width="16" height="10" rx="1" fill="#C0C0C0" stroke="#888"/>

  <!-- Светодиод бортовой (LED GP25) -->
  <g transform="translate(50, 130)">
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#FFF8B0" stroke="#999"/>
    <circle cx="0" cy="0" r="2.5" fill="#6FAE5A"/>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FFFFFFAA">LED · GP25</text>
  </g>

  <!-- BOOTSEL кнопка -->
  <g transform="translate(180, 90)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#FFFFFF" stroke="#AAAAAA"/>
    <circle cx="0" cy="0" r="5" fill="#D4A017"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FFFFFFAA">BOOTSEL</text>
  </g>

  <!-- Пины. Левая колонка (1-20), правая колонка (40 вверху → 21 внизу) -->
  <!-- Шаг: ~23 единицы между пинами, начиная с y=72 -->
  <!-- Каждый пин: half-castellation (полукруг) + медная площадка + метка -->

  <g id="leftPins" font-family="sans-serif" font-size="8" font-weight="600">
    <!-- pin 1: GP0 -->
    <g transform="translate(15,72)">
      <rect x="-5" y="-7" width="24" height="14" fill="#D4A017" stroke="#8B6F18" stroke-width="0.4"/>
      <circle cx="0" cy="0" r="6" fill="#D4A017" stroke="#8B6F18" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/>
      <text x="24" y="3" fill="#FFFFFF">GP0</text>
      <text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">1</text>
    </g>
    <!-- pin 2 GP1 -->
    <g transform="translate(15,95)">
      <rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/>
      <text x="24" y="3" fill="#FFFFFF">GP1</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">2</text>
    </g>
    <!-- 3 GND -->
    <g transform="translate(15,118)">
      <rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/>
      <text x="24" y="3" fill="#888">GND</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">3</text>
    </g>
    <!-- 4 GP2 -->
    <g transform="translate(15,141)">
      <rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/>
      <text x="24" y="3" fill="#FFFFFF">GP2</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">4</text>
    </g>
    <g transform="translate(15,164)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP3</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">5</text></g>
    <g transform="translate(15,187)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP4</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">6</text></g>
    <g transform="translate(15,210)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP5</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">7</text></g>
    <g transform="translate(15,233)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#888">GND</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">8</text></g>
    <g transform="translate(15,256)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP6</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">9</text></g>
    <g transform="translate(15,279)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP7</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">10</text></g>
    <g transform="translate(15,302)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP8</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">11</text></g>
    <g transform="translate(15,325)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP9</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">12</text></g>
    <g transform="translate(15,348)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#888">GND</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">13</text></g>
    <g transform="translate(15,371)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP10</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">14</text></g>
    <g transform="translate(15,394)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP11</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">15</text></g>
    <g transform="translate(15,417)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP12</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">16</text></g>
    <g transform="translate(15,440)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFFFFF">GP13</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">17</text></g>
    <g transform="translate(15,463)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#888">GND</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">18</text></g>
    <g transform="translate(15,486)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFE070" font-weight="bold">GP14</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">19</text></g>
    <g transform="translate(15,509)"><rect x="-5" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="24" y="3" fill="#FFE070" font-weight="bold">GP15</text><text x="-10" y="3" text-anchor="end" fill="#FFFFFFAA" font-size="6">20</text></g>
  </g>

  <g id="rightPins" font-family="sans-serif" font-size="8" font-weight="600">
    <!-- ПРАВАЯ КОЛОНКА (сверху пин 40 VBUS, снизу пин 21 GP16) -->
    <!-- pin 40 VBUS -->
    <g transform="translate(215,72)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FF9060" font-weight="bold">VBUS</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">40</text></g>
    <!-- pin 39 VSYS -->
    <g transform="translate(215,95)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FF9060" font-weight="bold">VSYS</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">39</text></g>
    <!-- 38 GND -->
    <g transform="translate(215,118)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#888">GND</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">38</text></g>
    <!-- 37 3V3_EN -->
    <g transform="translate(215,141)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFB060">3V3_EN</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">37</text></g>
    <!-- 36 3V3_OUT -->
    <g transform="translate(215,164)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFE070" font-weight="bold">3V3</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">36</text></g>
    <!-- 35 ADC_VREF -->
    <g transform="translate(215,187)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#B0D0FF">VREF</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">35</text></g>
    <!-- 34 GP28 -->
    <g transform="translate(215,210)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#80D0FF">GP28</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">34</text></g>
    <!-- 33 AGND -->
    <g transform="translate(215,233)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#888">AGND</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">33</text></g>
    <!-- 32 GP27 -->
    <g transform="translate(215,256)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#80D0FF">GP27</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">32</text></g>
    <!-- 31 GP26 -->
    <g transform="translate(215,279)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#80D0FF">GP26</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">31</text></g>
    <!-- 30 RUN -->
    <g transform="translate(215,302)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FF8080">RUN</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">30</text></g>
    <!-- 29 GP22 -->
    <g transform="translate(215,325)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP22</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">29</text></g>
    <!-- 28 GND -->
    <g transform="translate(215,348)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#888">GND</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">28</text></g>
    <!-- 27 GP21 -->
    <g transform="translate(215,371)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP21</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">27</text></g>
    <!-- 26 GP20 -->
    <g transform="translate(215,394)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP20</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">26</text></g>
    <!-- 25 GP19 -->
    <g transform="translate(215,417)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP19</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">25</text></g>
    <!-- 24 GP18 -->
    <g transform="translate(215,440)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP18</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">24</text></g>
    <!-- 23 GND -->
    <g transform="translate(215,463)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#888">GND</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">23</text></g>
    <!-- 22 GP17 -->
    <g transform="translate(215,486)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP17</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">22</text></g>
    <!-- 21 GP16 -->
    <g transform="translate(215,509)"><rect x="-19" y="-7" width="24" height="14" fill="#D4A017"/><circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="2.5" fill="#1A1A1A"/><text x="-11" y="3" text-anchor="end" fill="#FFFFFF">GP16</text><text x="10" y="3" fill="#FFFFFFAA" font-size="6">21</text></g>
  </g>

  <!-- Шильдик снизу -->
  <g transform="translate(115, 543)">
    <text text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFFCC" font-weight="bold">Raspberry Pi Pico</text>
    <text y="11" text-anchor="middle" font-family="monospace" font-size="6" fill="#FFFFFF88">51 × 21 mm · RP2040</text>
  </g>

  <!-- Отладочные пины снизу по центру (SWD) -->
  <g transform="translate(115, 518)">
    <circle cx="-10" cy="0" r="3" fill="#D4A017" stroke="#8B6F18" stroke-width="0.3"/>
    <circle cx="0"   cy="0" r="3" fill="#D4A017" stroke="#8B6F18" stroke-width="0.3"/>
    <circle cx="10"  cy="0" r="3" fill="#D4A017" stroke="#8B6F18" stroke-width="0.3"/>
    <text x="-10" y="-7" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#FFFFFF99">SWCLK</text>
    <text x="0"   y="-7" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#FFFFFF99">GND</text>
    <text x="10"  y="-7" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#FFFFFF99">SWDIO</text>
  </g>

  <!-- Цветовая легенда GPIO выделена через цвет текста:
       жёлтый = используется в Модуле 1 (GP14, GP15, 3V3)
       оранжевый = питание (VBUS, VSYS, 3V3_EN)
       голубой = ADC (GP26-28)
       красный = специальный (RUN)
       серый = GND -->
</svg>
