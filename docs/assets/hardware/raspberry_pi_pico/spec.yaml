# Raspberry Pi Pico — паспорт компонента ShokanLab
# Источник данных: Raspberry Pi Pico Datasheet (официальный)
# https://datasheets.raspberrypi.com/pico/pico-datasheet.pdf

id: raspberry_pi_pico
name: Raspberry Pi Pico
name_short: Pico
category: board           # power | board | sensor | output | input | passive | tool

# Идентификация
model: "Pico"             # не Pico W, не Pico 2 — оригинальная
chip: "RP2040"
manufacturer: "Raspberry Pi Ltd"
aliases: ["RP2040 board", "Малина Пико"]
released: "2021-01"

# Физика
dimensions_mm:
  w: 51.0
  h: 21.0
  thickness: 1.0
weight_g: 3
pcb_color: "#0E5A3D"      # тёмно-зелёный, фирменный Raspberry Pi
silkscreen_color: "#FFFFFF"

# Чип и память
specs:
  mcu: "RP2040 (dual-core Cortex-M0+, до 133 МГц)"
  ram_kb: 264
  flash_mb: 2
  gpio_count: 26          # GP0..GP22, GP26..GP28 (GP23-25 внутренние)
  adc_count: 3            # GP26, GP27, GP28
  pwm_count: 16           # каналы на любых GPIO
  logic_voltage: 3.3      # ВАЖНО: логика 3.3V, не 5V-толерантная
  usb: "Micro-B 1.1"

# Питание
power:
  input:
    - { via: USB,      voltage: 5.0, connector: "Micro-B" }
    - { via: VSYS_pin, voltage_range: [1.8, 5.5] }
  output:
    - { label: "3V3(OUT)", voltage: 3.3, max_current_ma: 300 }
  max_current_per_gpio_ma: 12      # рекомендовано, абсолютный максимум ~25
  total_gpio_budget_ma: 50         # суммарно на все пины

# Безопасность (критично для подростков)
safety:
  do_not:
    - "НЕ подавать 5V или 12V на GPIO пины — моментальная поломка"
    - "НЕ коротить 3V3_OUT на GND напрямую"
    - "НЕ отключать USB при горящем индикаторе записи (корраптит флеш)"
  max_voltage_on_gpio: 3.3
  esd_warning: true         # статикой можно убить чип

# Пины — 40 контактов по краям + 3 отладочных снизу
# Порядок: от USB-разъёма вниз по левому краю (1-20), потом по правому (21-40)
pins:
  # ЛЕВЫЙ РЯД (USB сверху)
  - { num: 1,  name: "GP0",   type: digital, alt: "UART0 TX, I2C0 SDA, SPI0 RX" }
  - { num: 2,  name: "GP1",   type: digital, alt: "UART0 RX, I2C0 SCL, SPI0 CSn" }
  - { num: 3,  name: "GND",   type: gnd }
  - { num: 4,  name: "GP2",   type: digital, alt: "I2C1 SDA, SPI0 SCK" }
  - { num: 5,  name: "GP3",   type: digital, alt: "I2C1 SCL, SPI0 TX" }
  - { num: 6,  name: "GP4",   type: digital, alt: "UART1 TX, I2C0 SDA" }
  - { num: 7,  name: "GP5",   type: digital, alt: "UART1 RX, I2C0 SCL" }
  - { num: 8,  name: "GND",   type: gnd }
  - { num: 9,  name: "GP6",   type: digital, alt: "I2C1 SDA, SPI0 SCK" }
  - { num: 10, name: "GP7",   type: digital, alt: "I2C1 SCL, SPI0 TX" }
  - { num: 11, name: "GP8",   type: digital, alt: "UART1 TX, I2C0 SDA, SPI1 RX" }
  - { num: 12, name: "GP9",   type: digital, alt: "UART1 RX, I2C0 SCL, SPI1 CSn" }
  - { num: 13, name: "GND",   type: gnd }
  - { num: 14, name: "GP10",  type: digital, alt: "I2C1 SDA, SPI1 SCK" }
  - { num: 15, name: "GP11",  type: digital, alt: "I2C1 SCL, SPI1 TX" }
  - { num: 16, name: "GP12",  type: digital, alt: "UART0 TX, I2C0 SDA" }
  - { num: 17, name: "GP13",  type: digital, alt: "UART0 RX, I2C0 SCL" }
  - { num: 18, name: "GND",   type: gnd }
  - { num: 19, name: "GP14",  type: digital, alt: "I2C1 SDA, SPI1 SCK" }
  - { num: 20, name: "GP15",  type: digital, alt: "I2C1 SCL, SPI1 TX" }
  # ПРАВЫЙ РЯД (снизу вверх к USB)
  - { num: 21, name: "GP16",  type: digital, alt: "UART0 TX, I2C0 SDA, SPI0 RX" }
  - { num: 22, name: "GP17",  type: digital, alt: "UART0 RX, I2C0 SCL, SPI0 CSn" }
  - { num: 23, name: "GND",   type: gnd }
  - { num: 24, name: "GP18",  type: digital, alt: "I2C1 SDA, SPI0 SCK" }
  - { num: 25, name: "GP19",  type: digital, alt: "I2C1 SCL, SPI0 TX" }
  - { num: 26, name: "GP20",  type: digital, alt: "UART1 TX, I2C0 SDA" }
  - { num: 27, name: "GP21",  type: digital, alt: "UART1 RX, I2C0 SCL" }
  - { num: 28, name: "GND",   type: gnd }
  - { num: 29, name: "GP22",  type: digital }
  - { num: 30, name: "RUN",   type: reset,   notes: "при замыкании на GND — сброс MCU" }
  - { num: 31, name: "GP26",  type: adc,     alt: "ADC0, I2C1 SDA" }
  - { num: 32, name: "GP27",  type: adc,     alt: "ADC1, I2C1 SCL" }
  - { num: 33, name: "AGND",  type: gnd,     notes: "аналоговая земля, для ADC" }
  - { num: 34, name: "GP28",  type: adc,     alt: "ADC2" }
  - { num: 35, name: "ADC_VREF", type: ref,  notes: "опорное напряжение ADC" }
  - { num: 36, name: "3V3_OUT", type: power, voltage: 3.3, notes: "выход стабилизатора" }
  - { num: 37, name: "3V3_EN",  type: enable, notes: "включить/выключить стабилизатор" }
  - { num: 38, name: "GND",   type: gnd }
  - { num: 39, name: "VSYS",  type: power,  voltage_range: [1.8, 5.5], notes: "вход питания" }
  - { num: 40, name: "VBUS",  type: power,  voltage: 5.0, notes: "USB 5V" }

# Отладочные пины снизу (SWD)
debug_pins:
  - { name: "SWCLK", type: debug }
  - { name: "GND",   type: gnd }
  - { name: "SWDIO", type: debug }

# Встроенные компоненты
onboard:
  - { kind: button, label: "BOOTSEL", function: "зажать при подключении USB для загрузчика" }
  - { kind: led,    label: "LED",     color: green, gpio: 25, notes: "встроенный индикатор" }

# Как программировать
programming:
  languages: ["MicroPython", "CircuitPython", "C/C++ (Pico SDK)"]
  recommended_ide: "Thonny (для MicroPython)"
  flash_method: "Перетащить .uf2 в Pico (режим BOOTSEL)"

# Использование в курсе ShokanLab
used_in_modules: [1, 2, 3, 4, 5, 6, 7, 8]
first_introduced: 1
teaching_notes:
  - "Модуль 1: GP15 → IN реле. Простое управление цифровым выходом."
  - "Модуль 2: GP14 → вход ИК-датчика (цифровой)."
  - "Модуль 3: GP15 ШИМ — управление яркостью LED."

# Стоимость и закупка
price_kzt: 2500
supplier:
  primary: "AliExpress"
  alternatives: ["OLX Казахстан", "Robostore.kz"]
alternatives_for_replacement:
  - { id: "raspberry_pi_pico_w",  reason: "если нужен Wi-Fi, совместимы по пинам" }
  - { id: "raspberry_pi_pico_2",  reason: "новый чип RP2350, больше памяти" }

# Артефакты
assets:
  svg: "drawing.svg"
  reference_photo: "reference.jpg"     # попросить у Рамы каноническое фото
  datasheet_url: "https://datasheets.raspberrypi.com/pico/pico-datasheet.pdf"
  pinout_url: "https://datasheets.raspberrypi.com/pico/Pico-R3-A4-Pinout.pdf"

# SVG-якоря для автосборки схем модулей
# Координаты в SVG-системе drawing.svg (см. файл)
svg_anchors:
  GP0:  { x: 20,  y: 70 }
  GP1:  { x: 20,  y: 90 }
  GP14: { x: 20,  y: 350 }
  GP15: { x: 20,  y: 370 }
  "3V3_OUT": { x: 490, y: 190 }
  VSYS: { x: 490, y: 90 }
  VBUS: { x: 490, y: 70 }
  GND_pins: ["GND_3", "GND_8", "GND_13", "GND_18", "GND_23", "GND_28", "GND_38"]

# Метаданные записи
version: "1.0"
verified_by: null          # ← заполнить после проверки Рамы
verified_date: null
notes: |
  Оригинальная Pico (без Wi-Fi). В Модуле 1 используется только 3 пина:
  GP15 (выход на IN реле), 3V3_OUT (питание катушки реле), GND.
  BOOTSEL-кнопка не используется в модуле, показываем только как «режим прошивки».
